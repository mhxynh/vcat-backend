name: Test Database Schema, Seed, and DML

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test-database:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:16.3
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: vcat_test_db
          TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/vcat_test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Set up test environment variables
        run: |
          echo "TEST_DATABASE_URL=postgres://postgres:postgres@localhost:5432/postgres" >> $GITHUB_ENV

      - name: Test schema creation
        run: |
          psql -h localhost -U postgres -d postgres -f database/schema.sql
        env:
          PGPASSWORD: postgres

      - name: Test seed data loading
        run: |
          psql -h localhost -U postgres -d postgres -f database/seed.sql
        env:
          PGPASSWORD: postgres

      - name: Run integration tests
        run: |
          pytest tests/integration/test_schema.py -v
          pytest tests/integration/test_seed.py -v
          pytest tests/integration/test_dml.py -v
        env:
          TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/postgres

      - name: Test seed_from_tracker.sql (optional)
        run: |
          # Reset database first
          psql -h localhost -U postgres -d postgres -c "DROP SCHEMA public CASCADE; CREATE SCHEMA public;"
          psql -h localhost -U postgres -d postgres -f database/schema.sql
          psql -h localhost -U postgres -d postgres -f database/seed_from_tracker.sql
        env:
          PGPASSWORD: postgres

      - name: Show test summary
        if: always()
        run: echo "✅ Database schema, seed, and DML tests completed"