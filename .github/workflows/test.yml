name: Test Database Schema and Seed

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test-database:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: vcat_test_db
          TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/vcat_test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    env:
      PGHOST: localhost
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: vcat_test_db

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Test schema creation
        run: |
          psql -v ON_ERROR_STOP=1 -f database/schema.sql

      - name: Test seed data loading
        run: |
          psql -v ON_ERROR_STOP=1 -v USERS=50 -f database/seed.sql

      - name: Run integration tests
        run: |
          pytest tests/integration/test_schema.py -v
          pytest tests/integration/test_seed.py -v

      - name: Test seed_from_tracker.sql (optional)
        continue-on-error: true # Don't fail the build if this optional test fails
        run: |
          echo "Resetting database for tracker import test..."
          psql -c "DROP SCHEMA public CASCADE; CREATE SCHEMA public;"

          echo "Re-applying schema..."
          psql -v ON_ERROR_STOP=1 -f database/schema.sql

          echo "Importing tracker data..."
          psql -v ON_ERROR_STOP=1 -f database/seed_from_tracker.sql

      - name: Show test summary
        if: always()
        run: echo "✅ Database schema and seed tests completed"
