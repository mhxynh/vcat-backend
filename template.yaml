AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  vcat-backend

# More info about Globals: https://github.com/awslabs/serverless-application-model/blob/master/docs/globals.rst
Globals:
  Function:
    Timeout: 3
    Runtime: python3.12
    Architectures: [x86_64]
    Environment:
      Variables:
        DB_HOST: !Ref dbHostParam
        DB_NAME: !Ref dbNameParam
        DB_USER: !Ref dbUserParam
        DB_PASSWORD: !Ref dbPasswordParam
    LoggingConfig:
      LogFormat: JSON
  Api:
    Cors:
      AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
      AllowHeaders: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
      AllowOrigin: "'*'"

Parameters:
  dbHostParam:
    Type: String
  dbNameParam:
    Type: String
    Default: postgres
  dbUserParam:
    Type: String
    Default: postgres
  dbPasswordParam:
    Type: String
    NoEcho: true

Resources:
  CommonDependencyLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: vcat-common-layer
      Description: Shared utilities (db_utils, logger, crud)
      ContentUri: src/functions/common/python/
      CompatibleRuntimes:
        - python3.12
    Metadata:
      BuildMethod: python3.12
  ControlsFunction:
    Type: AWS::Serverless::Function # More info about Function Resource: https://github.com/awslabs/serverless-application-model/blob/master/versions/2016-10-31.md#awsserverlessfunction
    Properties:
      CodeUri: src/functions/controls/
      Handler: main.lambda_handler
      Layers:
        - !Ref CommonDependencyLayer
      Events:
        GetControls:
          Type: Api
          Properties:
            Path: /controls
            Method: get
        GetControlById:
          Type: Api
          Properties:
            Path: /controls/{id}
            Method: get
        CreateControl:
          Type: Api
          Properties:
            Path: /controls
            Method: post
        UpdateControl:
          Type: Api
          Properties:
            Path: /controls/{id}
            Method: put
        DeleteControl:
          Type: Api
          Properties:
            Path: /controls/{id}
            Method: delete

  TestsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/functions/tests/
      Handler: main.lambda_handler
      Layers:
        - !Ref CommonDependencyLayer
      Events:
        GetTests:
          Type: Api
          Properties:
            Path: /tests
            Method: get
        GetTestById:
          Type: Api
          Properties:
            Path: /tests/{test_id}
            Method: get
        CreateTest:
          Type: Api
          Properties:
            Path: /tests
            Method: post
        UpdateTest:
          Type: Api
          Properties:
            Path: /tests/{test_id}
            Method: put
        DeleteTest:
          Type: Api
          Properties:
            Path: /tests/{test_id}
            Method: delete

  RequestsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/functions/requests/
      Handler: main.lambda_handler
      Layers:
        - !Ref CommonDependencyLayer
      Events:
        GetRequests:
          Type: Api
          Properties:
            Path: /requests
            Method: get
        GetRequestById:
          Type: Api
          Properties:
            Path: /requests/{id}
            Method: get
        CreateRequest:
          Type: Api
          Properties:
            Path: /requests
            Method: post
        UpdateRequest:
          Type: Api
          Properties:
            Path: /requests/{id}
            Method: put
        DeleteRequest:
          Type: Api
          Properties:
            Path: /requests/{id}
            Method: delete

  CommentsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/functions/comments/
      Handler: main.lambda_handler
      Layers:
        - !Ref CommonDependencyLayer
      Events:
        GetComments:
          Type: Api
          Properties:
            Path: /comments
            Method: get

  AuditFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/functions/audit/
      Handler: main.lambda_handler
      Layers:
        - !Ref CommonDependencyLayer
      Events:
        GetAudit:
          Type: Api
          Properties:
            Path: /audit
            Method: get

  ExportFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/functions/exporting/
      Handler: main.lambda_handler
      Layers:
        - !Ref CommonDependencyLayer
      Events:
        ExportApi:
          Type: Api
          Properties:
            Path: /export
            Method: get

  NotificationsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/functions/notifications/
      Handler: main.lambda_handler
      Layers:
        - !Ref CommonDependencyLayer
      Events:
        GetNotifications:
          Type: Api
          Properties:
            Path: /notifications
            Method: get

  UserFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/functions/users/
      Handler: main.lambda_handler
      Layers:
        - !Ref CommonDependencyLayer
      Events:
        GetUsers:
          Type: Api
          Properties:
            Path: /users
            Method: get

  ApplicationResourceGroup:
    Type: AWS::ResourceGroups::Group
    Properties:
      Name:
        Fn::Sub: ApplicationInsights-SAM-${AWS::StackName}
      ResourceQuery:
        Type: CLOUDFORMATION_STACK_1_0
  ApplicationInsightsMonitoring:
    Type: AWS::ApplicationInsights::Application
    Properties:
      ResourceGroupName:
        Ref: ApplicationResourceGroup
      AutoConfigurationEnabled: "true"

# Outputs:
#   # ServerlessRestApi is an implicit API created out of Events key under Serverless::Function
#   # Find out more about other implicit resources you can reference within SAM
#   # https://github.com/awslabs/serverless-application-model/blob/master/docs/internals/generated_resources.rst#api
#   HelloWorldApi:
#     Description: API Gateway endpoint URL for Prod stage for Hello World
#       function
#     Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}/Prod/hello/"
#   HelloWorldFunction:
#     Description: Hello World Lambda Function ARN
#     Value: !GetAtt HelloWorldFunction.Arn
#   HelloWorldFunctionIamRole:
#     Description: Implicit IAM Role created for Hello World function
#     Value: !GetAtt HelloWorldFunctionRole.Arn
