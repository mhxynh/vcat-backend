AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  vcat-backend

# More info about Globals: https://github.com/awslabs/serverless-application-model/blob/master/docs/globals.rst
Globals:
  Function:
    Timeout: 3
    Runtime: python3.12
    Architectures: [x86_64]
    Environment:
      Variables:
        DB_HOST: !Ref dbHostParam
        DB_NAME: !Ref dbNameParam
        DB_USER: !Ref dbUserParam
        DB_PASSWORD: !Ref dbPasswordParam
    LoggingConfig:
      LogFormat: JSON

Parameters:
  dbHostParam:
    Type: String
  dbNameParam:
    Type: String
    Default: postgres
  dbUserParam:
    Type: String
    Default: postgres
  dbPasswordParam:
    Type: String
    NoEcho: true
  UserPoolArnPath:
    Type: "AWS::SSM::Parameter::Value<String>"
    Default: "/vcat/prod/cognito/user-pool-arn"
  SharedBucketArn:
    Type: String
    Default: arn:aws:s3:::aws-sam-cli-managed-default-samclisourcebucket-mkpwwj7siylh

Resources:
  VcatApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: Prod
      Cors:
        AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
        AllowHeaders: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
        AllowOrigin: "'*'"
      GatewayResponses:
        DEFAULT_4XX:
          ResponseParameters:
            Headers:
              Access-Control-Allow-Origin: "'*'"
              Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
              Access-Control-Allow-Methods: "'GET,POST,PUT,DELETE,OPTIONS'"
        DEFAULT_5XX:
          ResponseParameters:
            Headers:
              Access-Control-Allow-Origin: "'*'"
              Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
              Access-Control-Allow-Methods: "'GET,POST,PUT,DELETE,OPTIONS'"
      Auth:
        # Commenting out the next two lines to allow unauthenticated access to endpoints
        DefaultAuthorizer: MyCognitoAuthorizer
        AddDefaultAuthorizerToCorsPreflight: false
        Authorizers:
          MyCognitoAuthorizer:
            UserPoolArn: !Ref UserPoolArnPath

  CommonDependencyLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      LayerName: vcat-common-layer
      Description: Shared utilities (db_utils, logger, crud)
      ContentUri: src/functions/common/python/
      CompatibleRuntimes:
        - python3.12
    Metadata:
      BuildMethod: python3.12

  ControlsFunction:
    Type: AWS::Serverless::Function # More info about Function Resource: https://github.com/awslabs/serverless-application-model/blob/master/versions/2016-10-31.md#awsserverlessfunction
    Properties:
      CodeUri: src/functions/controls/
      Handler: main.lambda_handler
      Layers:
        - !Ref CommonDependencyLayer
      Events:
        GetControls:
          Type: Api
          Properties:
            Path: /controls
            Method: get
            RestApiId: !Ref VcatApi
            Auth:
              Authorizer: MyCognitoAuthorizer
        GetControlById:
          Type: Api
          Properties:
            Path: /controls/{id}
            Method: get
            RestApiId: !Ref VcatApi
            Auth:
              Authorizer: MyCognitoAuthorizer
        CreateControl:
          Type: Api
          Properties:
            Path: /controls
            Method: post
            RestApiId: !Ref VcatApi
            Auth:
              Authorizer: MyCognitoAuthorizer
        UpdateControl:
          Type: Api
          Properties:
            Path: /controls/{id}
            Method: put
            RestApiId: !Ref VcatApi
            Auth:
              Authorizer: MyCognitoAuthorizer
        DeleteControl:
          Type: Api
          Properties:
            Path: /controls/{id}
            Method: delete
            RestApiId: !Ref VcatApi
            Auth:
              Authorizer: MyCognitoAuthorizer

  TestsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/
      Handler: functions.tests.main.lambda_handler
      Layers:
        - !Ref CommonDependencyLayer
      Events:
        GetTests:
          Type: Api
          Properties:
            Path: /tests
            Method: get
            RestApiId: !Ref VcatApi
            Auth:
              Authorizer: MyCognitoAuthorizer
        GetTestById:
          Type: Api
          Properties:
            Path: /tests/{test_id}
            Method: get
            RestApiId: !Ref VcatApi
            Auth:
              Authorizer: MyCognitoAuthorizer
        CreateTest:
          Type: Api
          Properties:
            Path: /tests
            Method: post
            RestApiId: !Ref VcatApi
            Auth:
              Authorizer: MyCognitoAuthorizer
        UpdateTest:
          Type: Api
          Properties:
            Path: /tests/{test_id}
            Method: put
            RestApiId: !Ref VcatApi
            Auth:
              Authorizer: MyCognitoAuthorizer
        DeleteTest:
          Type: Api
          Properties:
            Path: /tests/{test_id}
            Method: delete
            RestApiId: !Ref VcatApi
            Auth:
              Authorizer: MyCognitoAuthorizer

  RequestsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/functions/requests/
      Handler: main.lambda_handler
      Layers:
        - !Ref CommonDependencyLayer
      Events:
        GetRequests:
          Type: Api
          Properties:
            Path: /requests
            Method: get
            RestApiId: !Ref VcatApi
            Auth:
              Authorizer: MyCognitoAuthorizer
        GetRequestById:
          Type: Api
          Properties:
            Path: /requests/{id}
            Method: get
            RestApiId: !Ref VcatApi
            Auth:
              Authorizer: MyCognitoAuthorizer
        CreateRequest:
          Type: Api
          Properties:
            Path: /requests
            Method: post
            RestApiId: !Ref VcatApi
            Auth:
              Authorizer: MyCognitoAuthorizer
        UpdateRequest:
          Type: Api
          Properties:
            Path: /requests/{id}
            Method: put
            RestApiId: !Ref VcatApi
            Auth:
              Authorizer: MyCognitoAuthorizer
        DeleteRequest:
          Type: Api
          Properties:
            Path: /requests/{id}
            Method: delete
            RestApiId: !Ref VcatApi
            Auth:
              Authorizer: MyCognitoAuthorizer

  CommentsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/functions/comments/
      Handler: main.lambda_handler
      Layers:
        - !Ref CommonDependencyLayer
      Events:
        GetComments:
          Type: Api
          Properties:
            Path: /comments
            Method: get
            RestApiId: !Ref VcatApi
            Auth:
              Authorizer: MyCognitoAuthorizer
        CreateComment:
          Type: Api
          Properties:
            Path: /comments
            Method: post
            RestApiId: !Ref VcatApi
            Auth:
              Authorizer: MyCognitoAuthorizer
        DeleteComment:
          Type: Api
          Properties:
            Path: /comments
            Method: delete
            RestApiId: !Ref VcatApi
            Auth:
              Authorizer: MyCognitoAuthorizer

  AuditFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/functions/audit/
      Handler: main.lambda_handler
      Layers:
        - !Ref CommonDependencyLayer
      Events:
        GetAudit:
          Type: Api
          Properties:
            Path: /audit
            Method: get
            RestApiId: !Ref VcatApi
            Auth:
              Authorizer: MyCognitoAuthorizer

  ExportFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/functions/exporting/
      Handler: main.lambda_handler
      Layers:
        - !Ref CommonDependencyLayer
      Timeout: 60
      Environment:
        Variables:
          EXPORT_BUCKET_NAME: !Select
            - 5
            - !Split [":", !Ref SharedBucketArn]
          EXPORT_KEY_PREFIX: exports/
          PRESIGNED_URL_TTL_SECONDS: "900"
      Policies:
        - S3CrudPolicy:
            BucketName: !Select
              - 5
              - !Split [":", !Ref SharedBucketArn]
      Events:
        ExportApi:
          Type: Api
          Properties:
            Path: /export
            Method: get
            RestApiId: !Ref VcatApi
            Auth:
              Authorizer: MyCognitoAuthorizer

  ImportFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/functions/importing/
      Handler: main.lambda_handler
      Layers:
        - !Ref CommonDependencyLayer
      Timeout: 60
      Environment:
        Variables:
          UPLOAD_BUCKET_NAME: !Select
            - 5
            - !Split [":", !Ref SharedBucketArn]
          UPLOAD_KEY_PREFIX: control-metadata/
          PRESIGNED_URL_TTL_SECONDS: "900"
          IMPORT_MAX_FILE_SIZE_MB: "20"
      Policies:
        - S3CrudPolicy:
            BucketName: !Select
              - 5
              - !Split [":", !Ref SharedBucketArn]
      Events:
        GetImportUploadUrl:
          Type: Api
          Properties:
            Path: /import
            Method: post
            RestApiId: !Ref VcatApi
            Auth:
              Authorizer: MyCognitoAuthorizer

  ImportUploadInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref ImportFunction
      Principal: s3.amazonaws.com
      SourceArn: !Ref SharedBucketArn

  NotificationsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/functions/notifications/
      Handler: main.lambda_handler
      Layers:
        - !Ref CommonDependencyLayer
      Events:
        GetNotifications:
          Type: Api
          Properties:
            Path: /notifications
            Method: get
            RestApiId: !Ref VcatApi
            Auth:
              Authorizer: MyCognitoAuthorizer

  UserFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/functions/users/
      Handler: main.lambda_handler
      Layers:
        - !Ref CommonDependencyLayer
      Events:
        GetUsers:
          Type: Api
          Properties:
            Path: /users
            Method: get
            RestApiId: !Ref VcatApi
            Auth:
              Authorizer: MyCognitoAuthorizer
        GetUserById:
          Type: Api
          Properties:
            Path: /users/{id}
            Method: get
            RestApiId: !Ref VcatApi
            Auth:
              Authorizer: MyCognitoAuthorizer
        DeleteUser:
          Type: Api
          Properties:
            Path: /users/{id}
            Method: delete
            RestApiId: !Ref VcatApi
            Auth:
              Authorizer: MyCognitoAuthorizer

  ApplicationResourceGroup:
    Type: AWS::ResourceGroups::Group
    Properties:
      Name:
        Fn::Sub: ApplicationInsights-SAM-${AWS::StackName}
      ResourceQuery:
        Type: CLOUDFORMATION_STACK_1_0
  ApplicationInsightsMonitoring:
    Type: AWS::ApplicationInsights::Application
    Properties:
      ResourceGroupName:
        Ref: ApplicationResourceGroup
      AutoConfigurationEnabled: "true"

# Outputs:
#   # ServerlessRestApi is an implicit API created out of Events key under Serverless::Function
#   # Find out more about other implicit resources you can reference within SAM
#   # https://github.com/awslabs/serverless-application-model/blob/master/docs/internals/generated_resources.rst#api
#   HelloWorldApi:
#     Description: API Gateway endpoint URL for Prod stage for Hello World
#       function
#     Value: !Sub "https://${ServerlessRestApi}.execute-api.${AWS::Region}.${AWS::URLSuffix}/Prod/hello/"
#   HelloWorldFunction:
#     Description: Hello World Lambda Function ARN
#     Value: !GetAtt HelloWorldFunction.Arn
#   HelloWorldFunctionIamRole:
#     Description: Implicit IAM Role created for Hello World function
#     Value: !GetAtt HelloWorldFunctionRole.Arn
